sampler:
  type: "emcee"
  fallback: "metropolis_hastings"
  n_walkers: 32
  n_steps: 10000
  n_burnin: 2000
  n_thin: 1
  moves:
    - type: "DEMove"
      weight: 0.8
    - type: "DESnookerMove"
      weight: 0.2

parameters:
  cosmological:
    Omega_m:
      prior: "gaussian"
      mean: 0.315
      sigma: 0.05
      bounds: [0.1, 0.6]
    h:
      prior: "gaussian"
      mean: 0.674
      sigma: 0.02
      bounds: [0.5, 0.9]
    w0:
      prior: "uniform"
      bounds: [-3.0, 0.0]
    wa:
      prior: "uniform"
      bounds: [-3.0, 3.0]

  phase_transition:
    alpha_PT:
      prior: "gaussian"
      mean: 0.42
      sigma: 0.03
      bounds: [0.01, 3.0]
    beta_over_H:
      prior: "gaussian"
      mean: 94.7
      sigma: 9.5
      bounds: [1.0, 1000.0]
    v_w:
      prior: "gaussian"
      mean: 0.27
      sigma: 0.04
      bounds: [0.05, 0.99]
    T_n_GeV:
      prior: "gaussian"
      mean: 9.71e15
      sigma: 0.48e15
      bounds: [1.0e14, 1.0e18]

convergence:
  gelman_rubin_threshold: 1.1
  autocorrelation_multiple: 50
  check_every_n_steps: 500

output:
  save_chain: true
  save_log_prob: true
  output_dir: "./outputs/data/"
  chain_format: "HDF5"
  corner_plot: true
  chain_evolution_plot: true